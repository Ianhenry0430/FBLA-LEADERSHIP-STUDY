<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FBLA Organizational Leadership Quiz</title>
<style>
  body { font-family: Arial; max-width: 900px; margin: auto; padding: 20px; background: #f4f4f4; }
  h1 { text-align: center; color: #00274d; }
  button { margin: 5px; padding: 10px 15px; font-size: 16px; cursor: pointer; }
  #options button { display: block; width: 100%; text-align: left; margin-bottom: 8px; }
  #result { margin-top: 10px; font-weight: bold; }
  #score { font-size: 18px; margin-top: 20px; }
  #timer { font-size: 20px; font-weight: bold; color: #d9534f; text-align: right; }
</style>
</head>
<body>

<h1>FBLA Organizational Leadership Quiz</h1>
<div id="timer">Time: 30s</div>
<p id="question"></p>
<div id="options"></div>
<p id="result"></p>
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question</button>
<p id="score"></p>

<script>

/* ==== RANDOM PICK FUNCTION ==== */
function getRandomQuestions(max=100){
  let shuffled = [...questionPool].sort(()=>0.5-Math.random());
  return shuffled.slice(0, Math.min(max, shuffled.length));
}

/* ==== QUIZ LOGIC ==== */
const questions = getRandomQuestions(100);
let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 30; // seconds per question

function startTimer(){
  clearInterval(timer);
  timeLeft = 30;
  document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
    if(timeLeft <= 0){
      clearInterval(timer);
      document.getElementById("result").innerText = `⏰ Time's up! Correct: ${questions[currentQuestion].options[questions[currentQuestion].answer]}`;
      Array.from(document.getElementById("options").children).forEach(btn=>btn.disabled=true);
      document.getElementById("nextBtn").style.display = "inline";
    }
  },1000);
}

function showQuestion(){
  if(currentQuestion >= questions.length) return;
  const q = questions[currentQuestion];
  document.getElementById("question").innerText = `${currentQuestion+1}. ${q.question}`;
  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  document.getElementById("result").innerText = "";
  document.getElementById("nextBtn").style.display = "none";
  startTimer();

  q.options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>checkAnswer(i);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(selected){
  clearInterval(timer);
  const q = questions[currentQuestion];
  const result = document.getElementById("result");
  if(selected === q.answer){
    result.innerText = "✅ Correct!";
    score++;
  } else {
    result.innerText = `❌ Wrong! Correct: ${q.options[q.answer]}`;
  }
  document.getElementById("nextBtn").style.display = "inline";
  Array.from(document.getElementById("options").children).forEach(btn=>btn.disabled=true);
}

function nextQuestion(){
  currentQuestion++;
  if(currentQuestion < questions.length){
    showQuestion();
  } else {
    document.getElementById("question").innerText = "🎉 Quiz Complete!";
    document.getElementById("options").innerHTML = "";
    document.getElementById("result").innerText = `Your Score: ${score} / ${questions.length}`;
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("timer").innerText = "";
  }
}

showQuestion();
</script>

</body>
</html>
