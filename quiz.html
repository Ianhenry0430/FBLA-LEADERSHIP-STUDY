<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FBLA Leadership Prep</title>

<style>
body { font-family: Arial; max-width: 900px; margin:auto; padding:20px; background:#f4f4f4; }
h1 { text-align:center; color:#00274d; }
button { padding:10px; margin:5px; cursor:pointer; }
#options button { display:block; width:100%; margin-bottom:8px; }
#timer { font-weight:bold; color:red; }
#menu { text-align:center; margin-bottom:20px; }
</style>

</head>
<body>

<h1>FBLA Leadership Prep</h1>

<div id="menu">
  <button onclick="startQuiz('easy')">Easy Quiz</button>
  <button onclick="startQuiz('medium')">Medium Quiz</button>
  <button onclick="startQuiz('hard')">Hard Quiz</button>
  <button onclick="startFlashcards()">Flashcards</button>
</div>

<div id="quizArea" style="display:none;">
  <div id="timer"></div>
  <p id="question"></p>
  <div id="options"></div>
  <p id="result"></p>
  <button onclick="nextQuestion()" id="nextBtn" style="display:none;">Next</button>
</div>

<div id="flashcardArea" style="display:none; text-align:center;">
  <h2 id="flashQ"></h2>
  <button onclick="showAnswer()">Show Answer</button>
  <p id="flashA"></p>
  <button onclick="nextFlash()">Next</button>
</div>

<div id="score"></div>

<script src="questions.js"></script>

<script>
let questions = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 30;

/* ===== START QUIZ ===== */
function startQuiz(level){
  document.getElementById("menu").style.display="none";
  document.getElementById("quizArea").style.display="block";

  questions = questionPool.filter(q => q.difficulty === level)
    .sort(()=>0.5-Math.random())
    .slice(0,100);

  current = 0;
  score = 0;
  showQuestion();
}

/* ===== TIMER ===== */
function startTimer(){
  clearInterval(timer);
  timeLeft = 30;
  timer = setInterval(()=>{
    document.getElementById("timer").innerText = "Time: "+timeLeft;
    timeLeft--;
    if(timeLeft < 0){
      clearInterval(timer);
      document.getElementById("result").innerText="⏰ Time’s up!";
      document.getElementById("nextBtn").style.display="block";
    }
  },1000);
}

/* ===== SHOW QUESTION ===== */
function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.question;
  let optDiv = document.getElementById("options");
  optDiv.innerHTML="";
  document.getElementById("result").innerText="";
  document.getElementById("nextBtn").style.display="none";

  startTimer();

  q.options.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    optDiv.appendChild(btn);
  });
}

/* ===== CHECK ANSWER ===== */
function checkAnswer(i){
  clearInterval(timer);
  let q = questions[current];
  if(i === q.answer){
    score++;
    document.getElementById("result").innerText="✅ Correct";
  } else {
    document.getElementById("result").innerText="❌ Correct: "+q.options[q.answer];
  }
  document.getElementById("nextBtn").style.display="block";
}

/* ===== NEXT QUESTION ===== */
function nextQuestion(){
  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    endQuiz();
  }
}

/* ===== END QUIZ ===== */
function endQuiz(){
  document.getElementById("quizArea").style.display="none";
  let percent = Math.round((score/questions.length)*100);

  let grade = percent>=90?"A":percent>=80?"B":percent>=70?"C":"D";

  document.getElementById("score").innerHTML =
    `<h2>Score: ${score}/${questions.length}</h2>
     <h3>${percent}% (${grade})</h3>
     <button onclick="location.reload()">Restart</button>`;
}

/* ===== FLASHCARDS ===== */
let flashIndex = 0;

function startFlashcards(){
  document.getElementById("menu").style.display="none";
  document.getElementById("flashcardArea").style.display="block";

  questions = [...questionPool].sort(()=>0.5-Math.random());
  flashIndex = 0;
  showFlash();
}

function showFlash(){
  let q = questions[flashIndex];
  document.getElementById("flashQ").innerText = q.question;
  document.getElementById("flashA").innerText = "";
}

function showAnswer(){
  let q = questions[flashIndex];
  document.getElementById("flashA").innerText = q.options[q.answer];
}

function nextFlash(){
  flashIndex++;
  if(flashIndex < questions.length){
    showFlash();
  } else {
    location.reload();
  }
}
</script>

<script src="questions.js"></script>
<script>

let score = 0;

/* TEST BUTTON CLICK */

  console.log("BUTTON CLICKED:", level);

  questions = questionPool.filter(q => q.difficulty === level);

  if(questions.length === 0){
    alert("No questions found for this level!");
    return;
  }

  current = 0;

  const q = questions[current];
  document.getElementById("question").innerText = q.question;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => nextQuestion();
    optionsDiv.appendChild(btn);
  });

</script>


</body>
</html>
